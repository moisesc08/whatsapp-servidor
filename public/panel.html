<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NOUmi · Panel de Mensajes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple:       #5B4E9E;
      --purple-dark:  #2D2566;
      --purple-mid:   #9088C0;
      --purple-light: #EDE8FF;
      --purple-ghost: #F9F8FF;
      --purple-hover: #F4F1FF;
      --yellow:       #F0D030;
      --yellow-dark:  #3D3370;
      --border:       #EAE6FA;
      --border-mid:   #DDD8F0;
      --white:        #FFFFFF;
      --text:         #2D2566;
      --text-muted:   #9088C0;
      --text-faint:   #B8B0D8;
      --green-dot:    #7DC87A;
    }
    html, body { height: 100%; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--purple-ghost); color: var(--text); min-height: 100vh; }

    nav {
      background: var(--white);
      border-bottom: 1.5px solid var(--border);
      padding: 12px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .nav-left { display: flex; align-items: center; gap: 14px; }
    .nav-logo { height: 44px; width: auto; display: block; }
    .nav-divider { width: 1.5px; height: 28px; background: var(--border); }
    .nav-subtitle { font-size: 13px; font-weight: 500; color: var(--text-muted); }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green-dot); margin-right: 5px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
    .status-txt { font-size: 12px; color: var(--text-muted); }
    .nav-tag { background: var(--yellow); color: var(--yellow-dark); font-size: 11px; font-weight: 800; padding: 5px 14px; border-radius: 20px; }

    main { max-width: 1100px; margin: 0 auto; padding: 28px 24px 48px; }

    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
    .stat { background: var(--white); border: 1.5px solid var(--border); border-top: 4px solid var(--purple); border-radius: 12px; padding: 18px 22px; }
    .stat-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; }
    .stat-val { font-size: 32px; font-weight: 800; color: var(--purple); line-height: 1; }
    .stat-val.sm { font-size: 18px; padding-top: 5px; }
    .stat-hint { font-size: 12px; color: var(--text-faint); margin-top: 5px; }

    .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
    .search-wrap { position: relative; flex: 1; min-width: 220px; }
    .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; }
    input[type="text"] { width: 100%; background: var(--white); border: 1.5px solid var(--border-mid); border-radius: 9px; padding: 9px 14px 9px 38px; font-size: 14px; font-family: inherit; color: var(--text); outline: none; }
    input[type="text"]::placeholder { color: var(--text-faint); }
    input[type="text"]:focus { border-color: var(--purple); }
    select { background: var(--white); border: 1.5px solid var(--border-mid); border-radius: 9px; padding: 9px 12px; font-size: 14px; font-family: inherit; color: var(--text); outline: none; cursor: pointer; }
    select:focus { border-color: var(--purple); }
    .toolbar-label { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
    button { background: var(--yellow); color: var(--yellow-dark); border: none; border-radius: 9px; padding: 9px 18px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    button:hover { background: #E8C820; }

    .table-card { background: var(--white); border: 1.5px solid var(--border); border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead tr { background: var(--purple); }
    thead th { padding: 13px 18px; text-align: left; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.85); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--purple-hover); }
    tbody tr.alt { background: #FDFCFF; }
    tbody tr.alt:hover { background: var(--purple-hover); }
    td { padding: 12px 18px; vertical-align: middle; }
    .col-num { color: var(--text-faint); font-weight: 700; font-size: 12px; width: 50px; }
    .col-phone { font-weight: 700; color: var(--purple); white-space: nowrap; }
    .col-msg { color: var(--text); max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .col-date { color: var(--text-muted); font-size: 13px; white-space: nowrap; }
    .col-time { background: var(--purple-light); color: var(--purple); font-size: 11px; font-weight: 700; padding: 4px 11px; border-radius: 20px; white-space: nowrap; display: inline-block; }

    .empty-cell { text-align: center; padding: 50px 16px !important; color: var(--text-muted); font-size: 14px; }
    .spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box { background: #FFF5F5; border: 1.5px solid #F0C8C8; color: #800; border-radius: 9px; padding: 12px 18px; font-size: 13px; margin-bottom: 14px; }

    .footer { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; font-size: 12px; color: var(--text-faint); }

    @media (max-width: 640px) {
      main { padding: 16px 12px 32px; }
      nav { padding: 10px 16px; }
      .nav-logo { height: 36px; }
      .stats { grid-template-columns: 1fr 1fr; }
      .stats .stat:last-child { grid-column: span 2; }
      .stat-val { font-size: 26px; }
      .col-msg { max-width: 140px; }
    }
  </style>
</head>
<body>

  </div>
</nav>

<main>
  <div id="error-area"></div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total mensajes</div>
      <div class="stat-val" id="stat-total">—</div>
      <div class="stat-hint">en la base de datos</div>
    </div>
    <div class="stat">
      <div class="stat-label">Contactos únicos</div>
      <div class="stat-val" id="stat-contacts">—</div>
      <div class="stat-hint">números distintos</div>
    </div>
    <div class="stat">
      <div class="stat-label">Último mensaje</div>
      <div class="stat-val sm" id="stat-latest">—</div>
      <div class="stat-hint" id="stat-latest-date">—</div>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#B8B0D8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search" placeholder="Buscar por teléfono o mensaje…" />
    </div>
    <span class="toolbar-label">Ordenar:</span>
    <select id="sort-sel">
      <option value="desc">Más reciente primero</option>
      <option value="asc">Más antiguo primero</option>
    </select>
    <button onclick="load()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Actualizar
    </button>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Teléfono</th>
          <th>Mensaje</th>
          <th>Fecha</th>
          <th>Hora</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="5" class="empty-cell"><div class="spinner"></div>Cargando mensajes…</td></tr>
      </tbody>
    </table>
  </div>

  <div class="footer">
    <span id="row-count"></span>
    <span>noumi.mx · NOUMI.MX S.A. de C.V.</span>
  </div>
</main>

<script>
  // ── Fetches from your own /api/mensajes route — no keys needed here ──
  const fmtP    = p => { const s=String(p).replace(/\D/g,''); return s.length===13&&s.startsWith('52')?'+52 '+s.slice(2,5)+' '+s.slice(5,9)+' '+s.slice(9):p; };
  const fmtDate = iso => new Date(iso).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'});
  const fmtTime = iso => new Date(iso).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});

  let all = [];

  async function load() {
    document.getElementById('error-area').innerHTML = '';
    try {
      const res = await fetch('/api/mensajes');
      if (!res.ok) throw new Error('Error ' + res.status);
      all = await res.json();
      updateStats();
      render();
      document.getElementById('last-update').textContent = 'Actualizado ' + new Date().toLocaleTimeString('es-MX');
    } catch(e) {
      document.getElementById('error-area').innerHTML = '<div class="error-box">⚠️ No se pudieron cargar los mensajes: ' + e.message + '</div>';
      document.getElementById('tbody').innerHTML = '<tr><td colspan="5" class="empty-cell">Error al cargar datos</td></tr>';
    }
  }

  function updateStats() {
    document.getElementById('stat-total').textContent    = all.length;
    document.getElementById('stat-contacts').textContent = new Set(all.map(m=>m.telefono)).size;
    if (all.length) {
      const l = [...all].sort((a,b)=>new Date(b.fecha_hora)-new Date(a.fecha_hora))[0];
      document.getElementById('stat-latest').textContent      = fmtTime(l.fecha_hora);
      document.getElementById('stat-latest-date').textContent = fmtDate(l.fecha_hora);
    }
  }

  function render() {
    const q   = document.getElementById('search').value.toLowerCase();
    const dir = document.getElementById('sort-sel').value;
    let rows  = all.filter(m => !q || fmtP(m.telefono).includes(q) || (m.mensaje||'').toLowerCase().includes(q));
    rows.sort((a,b) => dir==='desc' ? new Date(b.fecha_hora)-new Date(a.fecha_hora) : new Date(a.fecha_hora)-new Date(b.fecha_hora));
    const tbody = document.getElementById('tbody');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty-cell">Sin resultados</td></tr>';
    } else {
      tbody.innerHTML = rows.map((m,i) =>
        '<tr class="'+(i%2?'alt':'')+'">'+
        '<td class="col-num">'+(i+1)+'</td>'+
        '<td class="col-phone">'+fmtP(m.telefono)+'</td>'+
        '<td class="col-msg" title="'+m.mensaje+'">'+m.mensaje+'</td>'+
        '<td class="col-date">'+fmtDate(m.fecha_hora)+'</td>'+
        '<td><span class="col-time">'+fmtTime(m.fecha_hora)+'</span></td>'+
        '</tr>'
      ).join('');
    }
    document.getElementById('row-count').textContent = rows.length+' mensaje'+(rows.length!==1?'s':'')+' mostrado'+(rows.length!==1?'s':'');
  }

  document.getElementById('search').addEventListener('input', render);
  document.getElementById('sort-sel').addEventListener('change', render);

  load();
  setInterval(load, 30000);
</script>
</body>
</html>
